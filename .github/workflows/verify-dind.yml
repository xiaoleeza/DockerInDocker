name: Verify Scheme 1 (Fixed)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  verify-dind:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Create a dummy .tex file (with Chinese)
        run: |
          cat << 'EOF' > main.tex
          \documentclass{article}
          \usepackage{ctex} % 使用 ctex 宏包，配合 ctexorg/ctex 镜像
          \begin{document}
          Hello from GitHub Actions! 
          This PDF is compiled by Container B (ctexorg/ctex), triggered by Container A.
          测试中文编译成功！
          \end{document}
          EOF
          echo "✅ main.tex created."

      - name: 3. Start Container A (Mount Socket & Workspace)
        run: |
          HOST_WORKSPACE=${{ github.workspace }}
          echo "👉 Host absolute path: $HOST_WORKSPACE"

          docker run -d --name container_a \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOST_WORKSPACE:/workspace \
            -e HOST_WORKSPACE=$HOST_WORKSPACE \
            docker:latest \
            tail -f /dev/null
          
          echo "✅ Container A started."

      - name: 4. Container A triggers Container B (CTeX) to compile
        run: |
          # 关键点：更换为 ctexorg/ctex 镜像，它自带中文环境和 XeTeX
          docker exec container_a sh -c '
            echo "🚀 Inside Container A: Triggering Container B..."
            
            docker run --rm \
              -v $HOST_WORKSPACE:/miktex_data \
              -w /miktex_data \
              ctexorg/ctex:latest \
              xelatex -interaction=nonstopmode main.tex
          '
          
          echo "✅ Container B finished."

      - name: 5. Verify the output PDF
        run: |
          echo "📂 Listing files:"
          ls -l ${{ github.workspace }}
          
          if [ -f "${{ github.workspace }}/main.pdf" ]; then
            echo "🎉 Success! main.pdf generated."
            # 尝试读取 PDF 前几行确认不是空文件
            head -c 100 ${{ github.workspace }}/main.pdf || true
          else
            echo " Failed! Checking logs..."
            # 尝试打印编译日志
            cat ${{ github.workspace }}/main.log || echo "No log found"
            exit 1
          fi
